name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting (gofmt)
        run: test -z "$(gofmt -l .)" || { echo "gofmt が必要なファイル:"; gofmt -l .; exit 1; }

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...
